# Codemagic build pipeline for TechCrunch Go
workflows:
  android-build:
    name: Android Build (APK + AAB)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Regenerate platform folders
        script: |
          flutter create --project-name tech_crunch_go --org com.techcrunch.ios --platforms=android,ios .
      - name: Generate fresh release keystore
        script: |
          # Diagnostic CI-generated keystore (fresh per build), stored inside android/app.
          keytool -genkeypair -v \
            -keystore android/app/release.jks \
            -storepass appvyte123 -keypass appvyte123 \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=AppVyte Release, O=AppVyte, C=US"
      - name: Configure release signing (v1 + v2 + v3)
        script: |
          set -e
          # Locate the app-module build.gradle (Groovy) or build.gradle.kts (Kotlin DSL).
          GRADLE_FILE=""
          if [ -f android/app/build.gradle ]; then GRADLE_FILE=android/app/build.gradle; fi
          if [ -f android/app/build.gradle.kts ]; then GRADLE_FILE=android/app/build.gradle.kts; fi
          echo "App gradle file: $GRADLE_FILE"
          cat "$GRADLE_FILE"

          # Drop a self-contained Groovy signing script that overrides the release signingConfig
          # for every Android subproject, with v1/v2/v3 explicitly enabled.
          cat > android/app/appvyte-signing.gradle <<'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword "appvyte123"
                      keyAlias "release"
                      keyPassword "appvyte123"
                      enableV1Signing true
                      enableV2Signing true
                      enableV3Signing true
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

          # Apply it from the app build.gradle. Works for the Groovy DSL flutter create emits.
          if [ "$GRADLE_FILE" = "android/app/build.gradle" ]; then
            echo "" >> "$GRADLE_FILE"
            echo "apply from: 'appvyte-signing.gradle'" >> "$GRADLE_FILE"
          else
            # Kotlin DSL fallback
            echo "" >> "$GRADLE_FILE"
            echo "apply(from = \"appvyte-signing.gradle\")" >> "$GRADLE_FILE"
          fi
          echo "---- appended apply line ----"
          tail -n 5 "$GRADLE_FILE"
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Analyze project
        script: |
          flutter analyze || true
      - name: Build APK
        script: |
          flutter build apk --release
      - name: Build App Bundle
        script: |
          flutter build appbundle --release
      - name: Report signer + schemes
        script: |
          APK=$(ls build/app/outputs/flutter-apk/*.apk | head -n1)
          echo "=== APK: $APK ==="
          ls -la build/app/outputs/flutter-apk/
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort | tail -n1)
          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK" || true
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
