# Codemagic build pipeline for TechCrunch Go
workflows:
  android-build:
    name: Android Build (APK + AAB)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Regenerate platform folders
        script: |
          flutter create --project-name tech_crunch_go --org com.techcrunch.ios --platforms=android,ios .
      - name: Generate fresh release keystore
        script: |
          # Diagnostic CI-generated keystore (fresh per build), stored inside android/app.
          keytool -genkeypair -v \
            -keystore android/app/release.jks \
            -storepass appvyte123 -keypass appvyte123 \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=AppVyte Release, O=AppVyte, C=US"
      - name: Configure release signing (v1 + v2 + v3)
        script: |
          # key.properties consumed by the standard Flutter signing snippet below.
          cat > android/key.properties <<'PROPS'
          storePassword=appvyte123
          keyPassword=appvyte123
          keyAlias=release
          storeFile=release.jks
          PROPS
          # Patch android/app/build.gradle (Groovy DSL produced by flutter create):
          # load key.properties, add a release signingConfig with v1/v2/v3 enabled,
          # and point buildTypes.release at it (replacing the debug fallback).
          python3 - <<'PY'
          import re, io
          p = "android/app/build.gradle"
          s = open(p).read()

          # 1) Inject keystore loading before the android block.
          loader = (
            "def keystoreProperties = new Properties()\n"
            "def keystorePropertiesFile = rootProject.file('key.properties')\n"
            "if (keystorePropertiesFile.exists()) {\n"
            "    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n"
            "}\n\n"
          )
          s = re.sub(r'(\nandroid\s*\{)', "\n" + loader + r"\1", s, count=1)

          # 2) Add signingConfigs.release with all three schemes enabled, right after android block.
          signing = (
            "\n    signingConfigs {\n"
            "        release {\n"
            "            keyAlias keystoreProperties['keyAlias']\n"
            "            keyPassword keystoreProperties['keyPassword']\n"
            "            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null\n"
            "            storePassword keystoreProperties['storePassword']\n"
            "            enableV1Signing true\n"
            "            enableV2Signing true\n"
            "            enableV3Signing true\n"
            "        }\n"
            "    }\n"
          )
          s = re.sub(r'(\nandroid\s*\{)', r"\1" + signing, s, count=1)

          # 3) Point the release build type at the release signingConfig.
          if "buildTypes {" in s:
              s = re.sub(
                  r'release\s*\{\s*signingConfig\s+signingConfigs\.debug',
                  "release {\n            signingConfig signingConfigs.release",
                  s, count=1)
              # Some templates use signingConfigs.debug on its own line.
              s = s.replace("signingConfig signingConfigs.debug",
                            "signingConfig signingConfigs.release")
          open(p, "w").write(s)
          print("---- patched build.gradle ----")
          print(s)
          PY
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Analyze project
        script: |
          flutter analyze || true
      - name: Build APK
        script: |
          flutter build apk --release
      - name: Build App Bundle
        script: |
          flutter build appbundle --release
      - name: Report signer + schemes
        script: |
          APK=$(ls build/app/outputs/flutter-apk/*.apk | head -n1)
          echo "=== APK: $APK ==="
          ls -la build/app/outputs/flutter-apk/
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort | tail -n1)
          echo "Using apksigner: $APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK" || true
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
